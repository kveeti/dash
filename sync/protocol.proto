syntax = "proto3";

package protocol;

message PushOp {
  string id = 1;
  string sync_hlc = 2;
  bytes blob = 3;
  bool sync_is_deleted = 4;
}

message DeltaOp {
  string id = 1;
  string sync_hlc = 2;
  bytes blob = 3;
  bool sync_is_deleted = 4;
  int64 server_version = 5;
}

message Push {
  string batch_id = 1;
  repeated PushOp ops = 2;
}

message Ready {}

message Delta {
  string ack_for = 1;
  repeated DeltaOp ops = 2;
}

message Error {
  string code = 1;
  string message = 2;
}

message ClientFrame {
  oneof body {
    Push push = 1;
  }
}

message ServerFrame {
  oneof body {
    Ready ready = 1;
    Delta delta = 2;
    Error error = 3;
  }
}
